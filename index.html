<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cotizador Agrimensores SJ</title>
  
  <!-- Vinculación del Manifiesto PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Configuraciones Críticas Exclusivas para iPhone / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cotizador CASJ">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    /* Diseño estilo App Móvil Nativa (Moderna, limpia y oscura para descansar la vista en el campo) */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; display: block; }
    .app-container { max-width: 480px; margin: auto; margin-top: 20px; }
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 { font-size: 22px; color: #38bdf8; font-weight: 700; }
    .header p { font-size: 13px; color: #94a3b8; margin-top: 5px; }
    .card { background-color: #1e293b; border-radius: 16px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #cbd5e1; }
    input, select { width: 100%; background-color: #0f172a; border: 1px solid #475569; border-radius: 10px; padding: 14px; color: #fff; font-size: 16px; transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: #38bdf8; }
    button { width: 100%; background-color: #0284c7; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
    button:active { background-color: #0369a1; }
    .result-box { margin-top: 25px; background-color: #0f172a; border-radius: 12px; padding: 20px; text-align: center; border: 1px dashed #38bdf8; display: none; }
    .result-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    .result-value { font-size: 28px; font-weight: 700; color: #38bdf8; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>COLEGIO DE AGRIMENSORES</h1>
      <p>San Juan — Sistema de Cotización Móvil</p>
    </div>

    <div class="card">
      <!-- Formulario de Entrada Base -->
      <div class="form-group">
        <label for="superficie">Superficie Terreno (m²):</label>
        <input type="number" id="superficie" inputmode="decimal" placeholder="Ej: 750">
      </div>

      <div class="form-group">
        <label for="tipoTarea">Tipo de Trabajo Mandato:</label>
        <select id="tipoTarea">
          <option value="mensura">Mensura Particular</option>
          <option value="ph">Propiedad Horizontal (PH)</option>
          <option value="verificacion">Verificación de Subsistencia</option>
        </select>
      </div>

      <button onclick="procesarCotizacion()">Calcular Honorarios</button>

      <!-- Contenedor donde se mostrarán los resultados -->
      <div id="resultBox" class="result-box">
        <div class="result-title">Honorarios Estimados Sugeridos</div>
        <div id="resultValue" class="result-value">$ 0,00</div>
      </div>
    </div>
  </div>

  <!-- Inyección de la lógica PWA y Cotizador -->
  <script src="app.js"></script>
</body>
</html>
